<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1f4f8f"/>
  <!-- microphone: the "Text Recorder" app (sibling of the interlinear editor icon) -->
  <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round">
    <!-- cradle holding the mic -->
    <path d="M 156 246 A 100 100 0 0 0 356 246"/>
    <!-- stand -->
    <line x1="256" y1="346" x2="256" y2="408"/>
    <!-- base -->
    <line x1="198" y1="414" x2="314" y2="414"/>
  </g>
  <!-- mic body -->
  <rect x="206" y="96" width="100" height="208" rx="50" fill="#ffffff"/>
  <!-- record indicator -->
  <circle cx="256" cy="150" r="22" fill="#e53935"/>
</svg>
